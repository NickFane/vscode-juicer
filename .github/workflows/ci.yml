name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Validate bundle (syntax)
        run: npm run validate:bundle
      - name: Unit tests
        run: npm test
      - name: Docs audit
        run: npm run docs-audit
